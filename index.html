<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約・運行管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-pastel-green { background-color: #e6f4ea !important; }
        .bg-pastel-green:hover { background-color: #d2ebd9 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <script id="firebase-config-script">
        const firebaseConfig = {
            apiKey: "AIzaSyBKPgBROp1b-ONmSOc6qMRozs-_Pm5pbJ0",
            authDomain: "auto-rent-system-52efe.firebaseapp.com",
            projectId: "auto-rent-system-52efe",
            storageBucket: "auto-rent-system-52efe.firebasestorage.app",
            messagingSenderId: "516757126612",
            appId: "1:516757126612:web:2955f27d5266efbac86a41"
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, collection, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.firebaseApp = null;
        window.db = null;
        window.currentConfig = firebaseConfig;

        // チャイム音の設定
        const chimeAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav');

        function playChime() {
            chimeAudio.play().catch(e => console.log("Audio play blocked:", e));
        }

        // マスキング処理
        function maskName(name) {
            if (!name) return "";
            const parts = name.split(/[\s ]+/);
            if (parts.length > 0) return parts[0];
            return name;
        }

        function maskCarNumber(num) {
            if (!num) return "";
            const match = num.match(/\d+$/);
            if (match) return `* ${match[0].slice(-4)}`;
            return "***" + num.slice(-2);
        }

        // Firebase 初期化
        async function initFirebase() {
            try {
                window.firebaseApp = initializeApp(window.currentConfig);
                window.db = getFirestore(window.firebaseApp);
                const auth = getAuth(window.firebaseApp);
                await signInAnonymously(auth);
                updateCloudStatus(true);
                setupRealtimeListeners();
            } catch (error) {
                console.error("Firebase init error:", error);
                updateCloudStatus(false);
                loadLocalData();
            }
        }

        function updateCloudStatus(isLive) {
            const statusIndicator = document.getElementById('cloud-status');
            const statusText = document.getElementById('cloud-status-text');
            const sheetTitle = document.getElementById('sheet-title');

            if (isLive) {
                statusIndicator.className = "h-2.5 w-2.5 rounded-full bg-emerald-500 ring-4 ring-emerald-100 animate-pulse";
                statusText.innerText = "CLOUD LIVE";
                statusText.className = "text-xs font-bold text-emerald-600 tracking-wider";
                if (sheetTitle) sheetTitle.innerText = "リアルタイムクラウド共有シート";
            } else {
                statusIndicator.className = "h-2.5 w-2.5 rounded-full bg-amber-500 ring-4 ring-amber-100";
                statusText.innerText = "LOCAL MODE";
                statusText.className = "text-xs font-bold text-amber-600 tracking-wider";
                if (sheetTitle) sheetTitle.innerText = "ローカルスタンドアロンシート";
            }
        }

        let localReservations = [
            { id: "1", time: "09:00", name: "山田 太郎", car: "プリウス 豊橋500 あ 12-34", status: "出発済", note: "スタッドレス指定" },
            { id: "2", time: "10:30", name: "佐藤 美咲", car: "ヤリス 名古屋300 た 56-78", status: "対応中", note: "チャイルドシート1台" },
            { id: "3", time: "13:00", name: "鈴木 一郎", car: "アクア 尾張小牧500 さ 90-12", status: "予約数", note: "" }
        ];

        // 🌟 音の鳴る条件だけを修正（対応中になったときだけ他端末で鳴る）
        function setupRealtimeListeners() {
            const q = query(collection(window.db, "reservations"));
            let isFirstLoad = true;
            let previousStatuses = {}; 

            onSnapshot(q, (snapshot) => {
                let data = [];
                let triggerChime = false;

                snapshot.forEach((doc) => {
                    const currentData = doc.data();
                    const id = doc.id;
                    data.push({ id: id, ...currentData });

                    if (!isFirstLoad) {
                        const oldStatus = previousStatuses[id];
                        const newStatus = currentData.status;

                        // 前の状態が「対応中」ではなく、新ステータスが「対応中」になった時だけ鳴らす
                        if (oldStatus !== "対応中" && newStatus === "対応中") {
                            triggerChime = true;
                        }
                    }
                    previousStatuses[id] = currentData.status;
                });

                if (data.length === 0 && isFirstLoad) {
                    localReservations.forEach(async (res) => {
                        await setDoc(doc(window.db, "reservations", res.id), res);
                    });
                    return;
                }

                data.sort((a, b) => a.time.localeCompare(b.time));
                localReservations = data;
                
                if (!isFirstLoad && triggerChime) {
                    playChime(); 
                }
                isFirstLoad = false;
                
                renderData();
            }, (error) => {
                console.error("Snapshot error, falling back to local:", error);
                updateCloudStatus(false);
                renderData();
            });
        }

        function loadLocalData() {
            const saved = localStorage.getItem('auto_rent_reservations');
            if (saved) {
                localReservations = JSON.parse(saved);
            }
            renderData();
        }

        function saveLocalData() {
            localStorage.setItem('auto_rent_reservations', JSON.stringify(localReservations));
            if (!window.db) {
                renderData();
            }
        }

        async function updateStatus(id, newStatus) {
            if (window.db) {
                await setDoc(doc(window.db, "reservations", id), { status: newStatus }, { merge: true });
            } else {
                const idx = localReservations.findIndex(r => r.id === id);
                if (idx !== -1) {
                    localReservations[idx].status = newStatus;
                    saveLocalData();
                }
            }
        }

        async function addReservation(e) {
            e.preventDefault();
            const time = document.getElementById('form-time').value;
            const name = document.getElementById('form-name').value;
            const car = document.getElementById('form-car').value;
            const note = document.getElementById('form-note').value;
            const id = Date.now().toString();

            const newRes = { id, time, name, car, status: "予約数", note };

            if (window.db) {
                await setDoc(doc(window.db, "reservations", id), newRes);
            } else {
                localReservations.push(newRes);
                localReservations.sort((a, b) => a.time.localeCompare(b.time));
                saveLocalData();
            }
            document.getElementById('res-form').reset();
        }

        // 📋 【元の機能を完全維持】エクセル・スプレッドシート貼り付け解析ロジック
        function handlePaste(e) {
            e.preventDefault();
            const clipboardData = e.clipboardData || window.clipboardData;
            const pastedData = clipboardData.getData('Text');
            
            const rows = pastedData.split(/\r\n|\n|\r/);
            let addedCount = 0;

            rows.forEach((row, index) => {
                if (!row.trim()) return;
                const columns = row.split('\t');
                if (columns.length >= 3) {
                    const time = columns[0].trim();
                    const name = columns[1].trim();
                    const car = columns[2].trim();
                    const note = columns[3] ? columns[3].trim() : "";
                    
                    if (time && name && car) {
                        const id = (Date.now() + index).toString();
                        const newRes = { id, time, name, car, status: "予約数", note };
                        
                        if (window.db) {
                            setDoc(doc(window.db, "reservations", id), newRes);
                        } else {
                            localReservations.push(newRes);
                        }
                        addedCount++;
                    }
                }
            });

            if (addedCount > 0 && !window.db) {
                localReservations.sort((a, b) => a.time.localeCompare(b.time));
                saveLocalData();
            }
            alert(`${addedCount}件のデータをエクセルからインポートしました。`);
        }

        window.updateStatus = updateStatus;
        window.addReservation = addReservation;
        window.handlePaste = handlePaste;

        function renderData() {
            const tbody = document.getElementById('reservation-tbody');
            tbody.innerHTML = "";

            let countTotal = 0;
            let countActive = 0;
            let countDone = 0;

            localReservations.forEach((res) => {
                countTotal++;
                if (res.status === "対応中") countActive++;
                if (res.status === "出発済") countDone++;

                let rowClass = "border-b border-slate-200 hover:bg-slate-50 transition-colors";
                if (res.status === "対応中") {
                    rowClass = "bg-pastel-green border-b border-green-200";
                } else if (res.status === "出発済") {
                    rowClass = "bg-slate-100 opacity-60 border-b border-slate-200";
                }

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td class="px-6 py-4 font-semibold text-slate-700 whitespace-nowrap">${res.time}</td>
                    <td class="px-6 py-4 font-medium text-slate-900 whitespace-nowrap max-w-[180px] truncate">
                        <div class="flex items-center gap-2">
                            <span>${maskName(res.name)}</span>
                            <span class="text-xs text-slate-400 font-normal border border-slate-200 px-1.5 py-0.5 rounded">非公開</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-slate-600 whitespace-nowrap max-w-[220px] truncate">
                        <div class="flex items-center gap-2">
                            <i data-lucide="car" class="h-4 w-4 text-slate-400"></i>
                            <span>${maskCarNumber(res.car)}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex gap-1.5">
                            <button onclick="updateStatus('${res.id}', '予約数')" class="px-3 py-1 rounded-full text-xs font-semibold border ${res.status === '予約数' ? 'bg-blue-50 border-blue-500 text-blue-600 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'} transition-all cursor-pointer">予約数</button>
                            <button onclick="updateStatus('${res.id}', '対応中')" class="px-3 py-1 rounded-full text-xs font-semibold border ${res.status === '対応中' ? 'bg-emerald-50 border-emerald-500 text-emerald-600 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'} transition-all cursor-pointer">対応中</button>
                            <button onclick="updateStatus('${res.id}', '出発済')" class="px-3 py-1 rounded-full text-xs font-semibold border ${res.status === '出発済' ? 'bg-slate-200 border-slate-400 text-slate-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'} transition-all cursor-pointer">出発済</button>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-slate-500 max-w-[240px] truncate" title="${res.note}">${res.note || '<span class="text-slate-300">-</span>'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-total').innerText = countTotal;
            document.getElementById('stat-active').innerText = countActive;
            document.getElementById('stat-done').innerText = countDone;

            const progress = countTotal > 0 ? Math.round((countDone / countTotal) * 100) : 0;
            document.getElementById('stat-progress').innerText = progress + "%";
            document.getElementById('stat-progress-bar').style.width = progress + "%";

            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            document.getElementById('res-form').addEventListener('submit', window.addReservation);
            // エクセル貼り付けイベントの紐付け
            window.addEventListener('paste', window.handlePaste);
        });
    </script>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-xl text-indigo-600">
                    <i data-lucide="layout-dashboard" class="h-6 w-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-tight">予約・運行管理システム</h1>
                    <p class="text-xs text-slate-500 font-medium">Multi-Device Dashboard</p>
                </div>
            </div>
            <div class="bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-full flex items-center gap-2.5 shadow-sm">
                <span id="cloud-status" class="h-2.5 w-2.5 rounded-full bg-slate-300"></span>
                <span id="cloud-status-text" class="text-xs font-bold text-slate-400 tracking-wider">CONNECTING...</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="calendar" class="h-6 w-6"></i></div>
                <div><p class="text-xs font-medium text-slate-400 uppercase">本日予約数</p><p id="stat-total" class="text-2xl font-bold text-slate-900 mt-0.5">0</p></div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><i data-lucide="user-check" class="h-6 w-6"></i></div>
                <div><p class="text-xs font-medium text-slate-400 uppercase">対応中</p><p id="stat-active" class="text-2xl font-bold text-slate-900 mt-0.5">0</p></div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-slate-100 text-slate-600 rounded-lg"><i data-lucide="navigation" class="h-6 w-6"></i></div>
                <div><p class="text-xs font-medium text-slate-400 uppercase">出発済</p><p id="stat-done" class="text-2xl font-bold text-slate-900 mt-0.5">0</p></div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-2">
                <div class="flex justify-between items-center"><p class="text-xs font-medium text-slate-400 uppercase">進捗率</p><span id="stat-progress" class="text-sm font-bold text-indigo-600">0%</span></div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div id="stat-progress-bar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%;"></div></div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            <section class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4 lg:col-span-1">
                <div class="border-b border-slate-100 pb-3 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="h-5 w-5 text-indigo-500"></i>
                    <h2 class="font-bold text-slate-800 text-base">新規登録</h2>
                </div>
                <p class="text-xs text-slate-400 bg-slate-50 p-2.5 rounded-lg border border-dashed border-slate-200">💡 画面全体のどこでも【Excelの行を丸ごとコピーして貼り付け（Ctrl+V）】すれば一発でインポートできます！</p>
                <form id="res-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">予定時刻</label>
                        <input type="time" id="form-time" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">お客様氏名</label>
                        <input type="text" id="form-name" required placeholder="山田 太郎" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">車両情報</label>
                        <input type="text" id="form-car" required placeholder="プリウス 12-34" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">備考</label>
                        <textarea id="form-note" rows="2" placeholder="メモなど" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 transition-all resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-2.5 px-4 rounded-lg shadow-sm transition-colors cursor-pointer flex items-center justify-center gap-2">
                        <i data-lucide="check" class="h-4 w-4"></i><span>登録する</span>
                    </button>
                </form>
            </section>

            <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden lg:col-span-2">
                <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i data-lucide="list" class="h-5 w-5 text-indigo-500"></i>
                        <h2 id="sheet-title" class="font-bold text-slate-800 text-base">リアルタイムクラウド共有シート</h2>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-400 font-bold text-xs uppercase tracking-wider">
                                <th class="px-6 py-3 w-24">時刻</th>
                                <th class="px-6 py-3 w-44">氏名</th>
                                <th class="px-6 py-3 w-56">車両情報</th>
                                <th class="px-6 py-3 w-56">ステータス</th>
                                <th class="px-6 py-3">備考</th>
                            </tr>
                        </thead>
                        <tbody id="reservation-tbody" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-400">
            &copy; 2026 Auto-Rent Group. Monitor Display System.
        </div>
    </footer>

</body>
</html>
